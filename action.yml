name: "AgentGuard - AI PR Risk Assessment"
description: "Flags risky AI/bot-created pull requests that may need extra human attention."
author: "AgentGuard"

inputs:
  comment-threshold:
    description: "Risk level required before AgentGuard comments: low, medium, high, or critical. Overrides .agentguard.yml when provided."
    required: false

  config-path:
    description: "Path to the optional AgentGuard config file."
    required: false
    default: ".agentguard.yml"

  mode:
    description: "When AgentGuard should run: ai-only, labeled, or all-prs. Overrides .agentguard.yml when provided."
    required: false

  github-token:
    description: "GitHub token used by the action."
    required: false
    default: "${{ github.token }}"

  license-key:
    description: "AgentGuard license key. Required for private repositories once commercial licensing is active. Get one at https://agentguard.dev/pricing"
    required: false

runs:
  using: "node20"
  main: "dist/index.cjs"

branding:
  icon: "shield"
  color: "blue"
