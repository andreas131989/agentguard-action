name: AgentGuard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  agentguard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Public beta behavior does not require a backend, telemetry, or license server.
      # The license-key input is reserved for future commercial beta usage.
      - uses: andreas131989/agentguard-action@v0.1.0
        with:
          mode: ai-only
          comment-threshold: high
          # license-key: ${{ secrets.AGENTGUARD_LICENSE_KEY }}